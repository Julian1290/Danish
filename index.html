<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para mi Danish hermosa ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      max-width: 400px;
    }

    h1 {
      color: #ff4f81;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4f81;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ff2e6a;
    }

    img {
      margin-top: 20px;
      width: 100%;
      border-radius: 15px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Hola amor de mi vida ❤️</h1>

    <p>No tienes idea de cómo te extraño, te pienso en cada momento y quise hacerte código de guerra 💕</p>

    <button onclick="mostrarMensaje()">
      Estas lista ? dale click ❤️
    </button>

    <p id="mensaje"></p>

    <img id="foto" src="primera.jpeg">
  </div>

  <!-- AUDIO -->
  <audio id="musica">
    <source src="birds.mp3" type="audio/mpeg">
  </audio>

  <script>

    function mostrarMensaje() {

      // MENSAJE
      document.getElementById("mensaje").innerText =
        "¡Maravilloso! ❤️";

      // MOSTRAR FOTO
      document.getElementById("foto").style.display =
        "block";

      // REPRODUCIR MUSICA
      const musica = document.getElementById("musica");

      musica.play()
        .then(() => {
          console.log("Música reproduciéndose");
        })
        .catch(error => {
          console.log("Error:", error);
        });
    }

  </script>

</body>
</html>
