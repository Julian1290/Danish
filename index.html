<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para mi Danish hermosa ❤️</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      max-width: 400px;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .ocultar {
      opacity: 0;
      transform: scale(0.95);
    }

    h1 {
      color: #ff4f81;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4f81;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: block;
      width: 100%;
    }

    button:hover {
      background: #ff2e6a;
    }

    img {
      margin-top: 20px;
      width: 100%;
      border-radius: 15px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="card" id="card">

    <h1>Hola amor de mi vida ❤️</h1>

    <p>
      No tienes idea de cómo te extraño,
      te pienso en cada momento y quise
      hacerte este código de guerra ❤️
    </p>

    <button onclick="mostrarMensaje()">
      ¿Estás lista? Dale click ❤️
    </button>

    <p id="mensaje"></p>

    <img id="foto" src="primera.jpeg">

  </div>

  <audio id="musica">
    <source src="birds.mp3" type="audio/mpeg">
  </audio>

  <script>
    function mostrarMensaje() {
      document.getElementById("mensaje").innerText =
        "¡Maravilloso! ❤️";

      document.getElementById("foto").style.display = "block";

      const musica = document.getElementById("musica");
      musica.play();

      setTimeout(() => {
        mostrarPregunta();
      }, 3000);
    }

    function cambiarPantalla(contenido) {
      const card = document.getElementById("card");

      card.classList.add("ocultar");

      setTimeout(() => {
        card.innerHTML = contenido;
        card.classList.remove("ocultar");
      }, 800);
    }

    function mostrarPregunta() {
      cambiarPantalla(`
        <h1>Pregunta importante 😏</h1>

        <p>
          ¿En qué año me regresaste
          el follow en Insta?
        </p>

        <button onclick="respuestaCorrecta()">
          Nov 2024
        </button>

        <button onclick="respuestaIncorrecta()">
          Ago 2024
        </button>

        <p id="resultado"></p>

        <img id="fotoRespuesta" src="">
      `);
    }

    function respuestaCorrecta() {
      document.getElementById("resultado").innerText =
        "Correcto amor ❤️ ese momento no se me olvida.";

      const foto = document.getElementById("fotoRespuesta");
      foto.src = "foto2.jpeg";
      foto.style.display = "block";

      mostrarBotonSiguiente();
    }

    function respuestaIncorrecta() {
      document.getElementById("resultado").innerText =
        "JAJA casi amor, pero igual te amo 😂❤️";

      const foto = document.getElementById("fotoRespuesta");
      foto.src = "foto3.jpeg";
      foto.style.display = "block";

      mostrarBotonSiguiente();
    }

    function mostrarBotonSiguiente() {
      const boton = document.createElement("button");
      boton.innerText = "Siguiente ❤️";
      boton.onclick = mostrarPregunta2;

      document.getElementById("card").appendChild(boton);
    }

    function mostrarPregunta2() {
      cambiarPantalla(`
        <h1>Otra pregunta importante 😏</h1>

        <p>
          ¿Quién besó a quién en la posada?
        </p>

        <button onclick="respuesta2Incorrecta()">
          Tú me besaste
        </button>

        <button onclick="respuesta2Correcta()">
          No lo sabemos
        </button>

        <p id="resultado"></p>

        <img id="fotoRespuesta" src="">
      `);
    }

    function respuesta2Correcta() {
      document.getElementById("resultado").innerText =
        "Correcto 😂 voy a inventar una máquina del tiempo para salir de la duda =)";

      const foto = document.getElementById("fotoRespuesta");
      foto.src = "foto5.jpeg";
      foto.style.display = "block";
    }

    function respuesta2Incorrecta() {
      document.getElementById("resultado").innerText =
        "Mmm... yo creo que yo te besé 😏❤️";

      const foto = document.getElementById("fotoRespuesta");
      foto.src = "foto4.jpeg";
      foto.style.display = "block";
    }
  </script>

</body>
</html>
