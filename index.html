<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para mi Danish hermosa ❤️</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      max-width: 400px;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .ocultar {
      opacity: 0;
      transform: scale(0.95);
    }

    h1 {
      color: #ff4f81;
    }

    p {
      color: #555;
      font-size: 18px;
      line-height: 1.5;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4f81;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: block;
      width: 100%;
      transition: 0.3s;
    }

    button:hover {
      background: #ff2e6a;
      transform: scale(1.03);
    }

    img {
      margin-top: 20px;
      width: 100%;
      border-radius: 15px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="card" id="card">

    <h1>Hola amor de mi vida ❤️</h1>

    <p>
      No tienes idea de cómo te extraño,
      te pienso en cada momento y quise
      hacerte este código de guerra ❤️
    </p>

    <button onclick="mostrarMensaje()">
      ¿Estás lista? Dale click ❤️
    </button>

    <p id="mensaje"></p>

    <img id="foto" src="primera.jpeg">

  </div>

  <!-- MUSICA -->
  <audio id="musica">
    <source src="birds.mp3" type="audio/mpeg">
  </audio>

  <script>

    // INICIO
    function mostrarMensaje() {

      document.getElementById("mensaje").innerText =
        "¡Maravilloso! ❤️";

      document.getElementById("foto").style.display =
        "block";

      const musica =
        document.getElementById("musica");

      musica.play();

      setTimeout(() => {
        mostrarPregunta1();
      }, 3000);
    }


    // TRANSICION
    function cambiarPantalla(contenido) {

      const card =
        document.getElementById("card");

      card.classList.add("ocultar");

      setTimeout(() => {

        card.innerHTML = contenido;

        card.classList.remove("ocultar");

      }, 800);
    }


    // RESULTADOS
    function mostrarResultado(
      mensaje,
      foto,
      siguienteFuncion
    ) {

      document.getElementById("resultado")
        .innerText = mensaje;

      const imagen =
        document.getElementById("fotoRespuesta");

      imagen.src = foto;

      imagen.style.display = "block";

      const boton =
        document.createElement("button");

      boton.innerText = "Siguiente ❤️";

      boton.onclick = siguienteFuncion;

      document.getElementById("card")
        .appendChild(boton);
    }


    // PREGUNTA 1
    function mostrarPregunta1() {

      cambiarPantalla(`

        <h1>Pregunta importante 😏</h1>

        <p>
          ¿En qué año me regresaste
          el follow en Insta?
        </p>

        <button onclick="
          mostrarResultado(
            'Correcto amor ❤️ ese momento no se me olvida.',
            'foto2.jpeg',
            mostrarPregunta2
          )
        ">
          Nov 2024
        </button>

        <button onclick="
          mostrarResultado(
            'JAJA casi amor, pero igual te amo 😂❤️',
            'foto3.jpeg',
            mostrarPregunta2
          )
        ">
          Ago 2024
        </button>

        <p id="resultado"></p>

        <img id="fotoRespuesta" src="">

      `);
    }


    // PREGUNTA 2
    function mostrarPregunta2() {

      cambiarPantalla(`

        <h1>Otra pregunta importante 😏</h1>

        <p>
          ¿Quién besó a quién en la posada?
        </p>

        <button onclick="
          mostrarResultado(
            'Mmm... yo creo que yo te besé 😏❤️',
            'foto4.jpeg',
            mostrarPregunta3
          )
        ">
          Tú me besaste
        </button>

        <button onclick="
          mostrarResultado(
            'Correcto 😂 voy a inventar una máquina del tiempo para salir de la duda =)',
            'foto5.jpeg',
            mostrarPregunta3
          )
        ">
          No lo sabemos
        </button>

        <p id="resultado"></p>

        <img id="fotoRespuesta" src="">

      `);
    }


    // PREGUNTA 3
    function mostrarPregunta3() {

      cambiarPantalla(`

        <h1>Pregunta de paciencia ❤️</h1>

        <p>
          ¿Cuántos meses pasaron
          para volvernos a ver?
        </p>

        <button onclick="
          mostrarResultado(
            'No sabes cómo se me hicieron eternos ❤️',
            'foto6.jpeg',
            mostrarPregunta4
          )
        ">
          5 meses y medio
        </button>

        <button onclick="
          mostrarResultado(
            'Yo ya en este punto no podría no verte, no más 2 meses y te necesito ❤️',
            'foto7.jpeg',
            mostrarPregunta4
          )
        ">
          6 meses
        </button>

        <p id="resultado"></p>

        <img id="fotoRespuesta" src="">

      `);
    }


    // PREGUNTA 4
    function mostrarPregunta4() {

      cambiarPantalla(`

        <h1>Pregunta cinéfila 🎬</h1>

        <p>
          ¿Qué película fuimos
          a ver en otoño en Pachuca?
        </p>

        <button onclick="
          mostrarResultado(
            'Cerca amor pero la vimos en verano 😏',
            'foto8.jpeg',
            mostrarPregunta5
          )
        ">
          Superman
        </button>

        <button onclick="
          mostrarResultado(
            'Siuuuu fuimos al estreno de su álbum =)',
            'foto9.jpeg',
            mostrarPregunta5
          )
        ">
          Tay Tay
        </button>

        <p id="resultado"></p>

        <img id="fotoRespuesta" src="">

      `);
    }


    // PREGUNTA 5
    function mostrarPregunta5() {

      cambiarPantalla(`

        <h1>Pregunta tortuguita 🐢</h1>

        <p>
          ¿Cómo se llamaban las primeras
          tortugas que liberamos en Puerto?
        </p>

        <button onclick="
          mostrarResultado(
            'Yesssssss si te acordaste ❤️',
            'foto10.jpeg',
            mostrarPregunta6
          )
        ">
          Lorenza & Squartatule
        </button>

        <button onclick="
          mostrarResultado(
            'Esperemos que en 20 años se vuelvan a ver =)',
            'foto11.jpeg',
            mostrarPregunta6
          )
        ">
          Julian & la Danish
        </button>

        <p id="resultado"></p>

        <img id="fotoRespuesta" src="">

      `);
    }


    // PREGUNTA 6
    function mostrarPregunta6() {

      cambiarPantalla(`

        <h1>Última pregunta ❤️</h1>

        <p>
          ¿A dónde fue nuestro último viaje?
        </p>

        <button onclick="
          mostrarResultado(
            'Sí queríamos ir pero nos dio hueva haha, solo camita ❤️',
            'foto12.jpeg',
            mostrarFinal
          )
        ">
          Huasca
        </button>

        <button onclick="
          mostrarResultado(
            'Ashhhhh estuvo fácil, te amooo ❤️',
            'foto13.jpeg',
            mostrarFinal
          )
        ">
          Omitlán
        </button>

        <p id="resultado"></p>

        <img id="fotoRespuesta" src="">

      `);
    }


    // FINAL
function mostrarFinal() {

  cambiarPantalla(`

    <h1>Para terminar ❤️</h1>

    <p>
      No olvides que te amo y te pienso todo el tiempo ❤️
    </p>

    <p>
      Eres la niña con la sonrisa más hermosa
      y soy afortunado de tenerte TLJ =)
    </p>

    <img src="foto14.jpeg" style="display:block;">

  `);
}

  </script>

</body>
</html>
